name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate pacman graph
        uses: Platane/snk@v3
        with:
          github_user_name: ArilZuhdiana08
          outputs: |
            dist/pacman-contribution-graph.svg

      - name: Push pacman graph
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "Generate Pacman contribution graph"
